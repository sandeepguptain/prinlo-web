<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prinlo: Your Prints, On Time</title>
    <style>
        /* 1. Reset and occupy full height */
        body, html {
            height: 100%;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* 2. The Parent Container (The Magic) */
        .flex-wrapper {
            display: flex;
            justify-content: center; /* Horizontal centering */
            align-items: center;     /* Vertical centering */
            height: 100vh;           /* 100% of the viewport height */
        }

        /* 3. The Log Box */
        .log-container {
            width: 100%;
            height: 174px;
            background:url("prinlo logo1.jpg") no-repeat center center;
            backgroup-size:100%;
        }
    </style>
</head>
<body>

    <div class="flex-wrapper">
        <div class="log-container">
        </div>
    </div>

</body>
</html>
