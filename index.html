<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centered Log Container</title>
    <style>
        /* 1. Reset and occupy full height */
        body, html {
            height: 100%;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* 2. The Parent Container (The Magic) */
        .flex-wrapper {
            display: flex;
            justify-content: center; /* Horizontal centering */
            align-items: center;     /* Vertical centering */
            height: 100vh;           /* 100% of the viewport height */
        }

        /* 3. The Log Box */
        .log-container {
            width: 400px;
            padding: 30px;
            background: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-radius: 8px;
            text-align: center;
            background:url("prinlo logo1.jpg") no-repeat center center
        }

        h2 { color: #333; }
        p { color: #666; }
    </style>
</head>
<body>

    <div class="flex-wrapper">
        <div class="log-container">
          
        </div>
    </div>

</body>
</html>
